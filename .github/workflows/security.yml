name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep (security-audit + secrets)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.156.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: semgrep scan --config p/security-audit --config p/secrets --error --metrics=off

  python-audit:
    name: python (ruff + bandit + mypy + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e .[dev] ruff bandit pip-audit mypy
      - name: ruff
        run: ruff check src tests
      - name: bandit
        run: bandit -r src -ll
      - name: mypy
        run: mypy src --ignore-missing-imports
        continue-on-error: true
      - name: pip-audit
        run: pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph
        continue-on-error: true
