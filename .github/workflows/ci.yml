name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: ruff check
        run: ruff check src tests examples

      - name: mypy
        run: mypy src

      - name: pytest
        run: pytest tests -v

      - name: CLI smoke
        shell: bash
        env:
          PYTHONPATH: .
        run: |
          tracewright replay tests/fixtures/enriched_trace.jsonl \
            --candidate examples.echo_candidate:echo --candidate-model echo
          # constant_candidate must exit non-zero
          ! tracewright replay tests/fixtures/enriched_trace.jsonl \
              --candidate examples.echo_candidate:constant --candidate-model fixed
